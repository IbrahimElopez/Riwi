<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mis Mascotas</title>
    <!-- Estilos compartidos -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <!-- ENCABEZADO -->
    <header>
      <h1>Mis Mascotas</h1>
    </header>

    <!-- GALERÍA DE MASCOTAS -->
    <section id="grid_pets">

      <!-- Mascota 1: León -->
      <article class="pet-card">
        <img
          src="https://i.pinimg.com/474x/f9/9b/88/f99b8849501ee63ebd86b1db82963055.jpg"
          alt="Lion looking strong and eager to move"
        />
        <h3>Lion</h3>
        <p>The king of the jungle.</p>
      </article>

      <!-- Mascota 2: Lobo -->
      <article class="pet-card">
        <img
          src="https://static.wikia.nocookie.net/reinoanimalia/images/7/74/Lobo_gris.jpg/revision/latest?cb=20121211084415&path-prefix=es"
          alt="A wolf with blue eyes and black and white coat"
        />
        <h3>Wolf</h3>
        <p>The pack leader.</p>
      </article>

      <!-- Mascota 3: Caballo -->
      <article class="pet-card">
        <img
          src="https://tiendahipicaderaza.es/img/leoblog/b/1/112/lg-b-112.jpg"
          alt="A brown Thoroughbred horse looking forward"
        />
        <h3>Horse</h3>
        <p>The giant noble.</p>
      </article>

      <!-- Mascota 4: Gato (imagen nueva) -->
      <article class="pet-card">
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQkYSAdvMq-2vbhnAM-6RUhZB9tSqwCsXDfxQ&s"
          alt="A cat sitting and looking directly at the camera"
        />
        <h3>Cat</h3>
        <p>The independent wanderer.</p>
      </article>

      <!-- Mascota 5: Huskie (imagen nueva) -->
      <article class="pet-card">
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRydj2GA_CszPGynGB_1MBEWB9csmv6NPpwDA&s"
          alt="A Huskie dog looking up with a happy expression"
        />
        <h3>Huskie</h3>
        <p>The loyal companion.</p>
      </article>

      <!-- Mascota 6: Suricata (imagen guardada localmente) -->
      <article class="pet-card">
        <img
          src="suricata.jpg"
          alt="A meerkat standing upright and looking into the distance"
        />
        <h3>Suricata</h3>
        <p>The curious little guardian.</p>
      </article>

    </section>

    <!-- ENLACE DE REGRESO -->
    <footer>
      <a href="index.html">← Back to Portfolio</a>
    </footer>

  </body>
</html>
